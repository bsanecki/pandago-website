<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandago</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{
            background:#121212;
            color:white;
            text-align:center;
        }

        .container{
            max-width:900px;
            margin:auto;
            padding:40px 20px;
        }

        h1{
            font-size:58px;
            margin-bottom:15px;
        }

        h2{
            margin-bottom:15px;
        }

        p{
            color:#cccccc;
            line-height:1.6;
        }

        section{
            background:#1b1b1b;
            border-radius:20px;
            padding:35px;
            margin-top:30px;
        }

        .button{
            display:inline-block;
            margin-top:25px;
            padding:15px 28px;
            background:#27ae60;
            color:white;
            text-decoration:none;
            border-radius:12px;
            font-weight:bold;
            transition:.2s;
        }

        .button:hover{
            background:#2ecc71;
        }

        footer{
            margin:50px 0 30px;
            color:#888;
        }
    </style>

</head>
<body>

<div class="container">

<section>

<h1>🐼 Pandago</h1>

<p>
Stay focused. Learn smarter.
</p>

<a class="button" href="https://play.google.com/store/apps/details?id=com.pandago.app">
Download on Google Play
</a>

</section>

<footer>

© 2026 Pandago<br>
Developed by Local Privacy Labs

</footer>

</div>

</body>
</html>
